version: "3.9"

services:
  # ---------------------------
  # MLflow server for tracking experiments
  # ---------------------------
  mlflow-server:
    build: .
    container_name: mlflow-server
    command: >
      mlflow server
      --backend-store-uri /mlflow/mlruns
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

  # ---------------------------
  # Training container
  # ---------------------------
  train-runner:
    build: .
    container_name: train-runner
    depends_on:
      - mlflow-server
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
    volumes:
      - ./data:/app/data
      - mlflow-data:/mlflow
    entrypoint: >
      /bin/bash -c "
      echo 'Waiting for MLflow server...';
      until curl -s http://mlflow-server:5000; do sleep 2; done;
      echo 'MLflow server ready, starting training';
      python train.py
      "

volumes:
  mlflow-data:
